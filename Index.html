<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ትራያንግል ለማጂ</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
            --accent-red: #ff0000;
        }

        .dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.5s;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* የመግቢያ ዲኮር (Loading/Login) */
        #login-screen {
            text-align: center;
        }

        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid var(--accent-red);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
            box-shadow: 0 0 15px var(--accent-red);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ዋናው ፎርም */
        #main-content {
            display: none;
            width: 80%;
            max-width: 800px;
            padding: 20px;
            border: 1px solid #ccc;
            background: var(--bg-color);
        }

        .menu-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
        }

        .btn {
            background: var(--accent-red);
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>ትራያንግል ለማጂ</h1>
        <div class="spinner"></div>
        <input type="password" id="passInput" placeholder="ሚስጥር ቁጥር ያስገቡ...">
        <br>
        <button class="btn" onclick="checkPassword()">ግባ</button>
    </div>

    <div id="main-content">
        <div class="menu-bar">
            <div><strong>ትራያንግል ለማጂ - መመዝገቢያ</strong></div>
            <div>
                <button onclick="toggleDarkMode()">ጥቁር/ነጭ</button>
                <button onclick="showMenu()">⋮</button>
            </div>
        </div>

        <div id="menu-options" class="hidden" style="background: #eee; color: #000; padding: 10px;">
            <p onclick="alert('አዲስ ፋይል ተከፈተ')">New Chat</p>
            <p onclick="saveData()">Save</p>
        </div>

        <div class="registration-form">
            <label>ሙሉ ስም፡</label>
            <input type="text" id="fullName" placeholder="ለምሳሌ፡ ናሆም ሀጎስ ገብረገርግስ">
            
            <label>ስልክ ቁጥር 1፡</label>
            <input type="tel" id="phone1">
            <label>ስልክ ቁጥር 2፡</label>
            <input type="tel" id="phone2">
            <label>ስልክ ቁጥር 3፡</label>
            <input type="tel" id="phone3">

            <label>የመዝገብ አይነት (ክፍያ)፡</label>
            <select id="vehicleType">
                <option value="automobile">አውቶሞቢል</option>
                <option value="bajaj">ባጃጅ</option>
                <option value="public">ህዝብ 1</option>
                <option value="motor">ሞተር</option>
            </select>

            <button class="btn" onclick="saveData()">መዝግብ (Save)</button>
        </div>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('passInput').value;
            if (pass === "1306") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("የተሳሳተ ቁጥር ነው!");
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function showMenu() {
            const menu = document.getElementById('menu-options');
            menu.classList.toggle('hidden');
        }

        function saveData() {
            const name = document.getElementById('fullName').value;
            if(name) {
                alert(name + " በስኬት ተመዝግቧል!");
                // እዚህ ጋር ዳታውን ሴቭ የሚያደርግ ኮድ መጨመር ይቻላል
            } else {
                alert("እባክዎ ስም ያስገቡ");
            }
        }
    </script>
</body>
</html>
